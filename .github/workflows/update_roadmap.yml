name: Update Global Roadmap

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: # Добавяме изрични права тук
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Използваме по-нова версия v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Roadmap Script
        run: python collect_roadmap.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.md
          git commit -m "auto: update global roadmap index" || echo "No changes to commit"
          git push